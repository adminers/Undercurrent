<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文件下载管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            color: #fff;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .subtitle {
            color: #888;
            font-size: 14px;
        }

        .stats-bar {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 30px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #4ecdc4;
        }

        .stat-label {
            font-size: 13px;
            color: #888;
            margin-top: 4px;
        }

        .search-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 24px;
            flex-wrap: wrap;
        }

        .search-input {
            flex: 1;
            min-width: 200px;
            padding: 12px 16px;
            border: 1px solid #333;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .search-input:focus {
            border-color: #4ecdc4;
        }

        .search-input::placeholder {
            color: #666;
        }

        .filter-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #4ecdc4 0%, #44a08d 100%);
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .filter-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(78, 205, 196, 0.4);
        }

        .file-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .file-card {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .file-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border-color: #4ecdc4;
        }

        .file-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .file-icon {
            width: 48px;
            height: 48px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .file-icon.document {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }

        .file-icon.image {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        }

        .file-icon.archive {
            background: linear-gradient(135deg, #fa709a 0%, #fee140 100%);
        }

        .file-icon.video {
            background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
        }

        .file-icon.audio {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
        }

        .file-icon.other {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .file-info {
            flex: 1;
            overflow: hidden;
        }

        .file-name {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .file-type {
            font-size: 12px;
            color: #888;
            margin-top: 2px;
        }

        .file-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 16px;
            font-size: 12px;
            color: #888;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .meta-item svg {
            width: 14px;
            height: 14px;
            fill: #888;
        }

        .file-actions {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }

        .action-btn.download {
            background: linear-gradient(135deg, #4ecdc4 0%, #44a08d 100%);
            color: #fff;
        }

        .action-btn.info {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .action-btn:hover {
            transform: translateY(-2px);
        }

        .action-btn svg {
            width: 14px;
            height: 14px;
            fill: currentColor;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
            opacity: 0.3;
        }

        .empty-icon svg {
            width: 100%;
            height: 100%;
            fill: #888;
        }

        .empty-text {
            color: #888;
            font-size: 16px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(78, 205, 196, 0.3);
            border-top-color: #4ecdc4;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.show {
            display: flex;
        }

        .modal {
            background: #1a1a2e;
            border-radius: 16px;
            padding: 24px;
            width: 90%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .modal-title {
            font-size: 18px;
            font-weight: 600;
            color: #fff;
        }

        .modal-close {
            width: 32px;
            height: 32px;
            border: none;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-close:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .modal-body {
            color: #888;
            font-size: 14px;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .info-label {
            color: #666;
        }

        .info-value {
            color: #fff;
            font-weight: 500;
            word-break: break-all;
            text-align: right;
        }

        .copy-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            background: rgba(78, 205, 196, 0.2);
            color: #4ecdc4;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s ease;
        }

        .copy-btn:hover {
            background: rgba(78, 205, 196, 0.3);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 24px;
            }

            .stats-bar {
                gap: 20px;
            }

            .stat-value {
                font-size: 22px;
            }

            .file-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📁 文件下载管理</h1>
            <p class="subtitle">浏览和下载已上传的文件</p>
        </div>

        <div class="stats-bar">
            <div class="stat-item">
                <div class="stat-value" id="totalFiles">0</div>
                <div class="stat-label">总文件数</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="totalSize">0</div>
                <div class="stat-label">总大小</div>
            </div>
            <div class="stat-item">
                <div class="stat-value" id="fileTypes">0</div>
                <div class="stat-label">文件类型</div>
            </div>
        </div>

        <div class="search-bar">
            <input type="text" class="search-input" id="searchInput" placeholder="搜索文件名...">
            <button class="filter-btn" onclick="loadFiles()">🔄 刷新列表</button>
        </div>

        <div class="file-grid" id="fileGrid">
            <div class="loading">
                <div class="spinner"></div>
                <p>加载中...</p>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title">文件详情</span>
                <button class="modal-close" onclick="closeModal()">×</button>
            </div>
            <div class="modal-body" id="modalBody">
            </div>
        </div>
    </div>

    <script>
        let allFiles = [];

        async function loadFiles() {
            const grid = document.getElementById('fileGrid');
            grid.innerHTML = '<div class="loading"><div class="spinner"></div><p>加载中...</p></div>';

            try {
                const response = await fetch('/api/files/list');
                allFiles = await response.json();
                renderFiles(allFiles);
                updateStats();
            } catch (error) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <svg viewBox="0 0 24 24">
                                <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
                            </svg>
                        </div>
                        <p class="empty-text">加载失败: ${error.message}</p>
                    </div>
                `;
            }
        }

        function renderFiles(files) {
            const grid = document.getElementById('fileGrid');

            if (files.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-icon">
                            <svg viewBox="0 0 24 24">
                                <path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/>
                            </svg>
                        </div>
                        <p class="empty-text">暂无文件</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = files.map(file => `
                <div class="file-card">
                    <div class="file-header">
                        <div class="file-icon ${getFileIconClass(file.fileType)}">
                            ${getFileIcon(file.fileType)}
                        </div>
                        <div class="file-info">
                            <div class="file-name" title="${file.fileName}">${file.fileName}</div>
                            <div class="file-type">${file.fileType || 'unknown'}</div>
                        </div>
                    </div>
                    <div class="file-meta">
                        <div class="meta-item">
                            <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
                            <span>${formatFileSize(file.fileSize)}</span>
                        </div>
                        <div class="meta-item">
                            <svg viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5c-1.11 0-1.99.9-1.99 2L3 20c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 16H5V9h14v11zM9 11H7v2h2v-2zm4 0h-2v2h2v-2zm4 0h-2v2h2v-2z"/></svg>
                            <span>${file.uploadTime ? formatDate(file.uploadTime) : '-'}</span>
                        </div>
                    </div>
                    <div class="file-actions">
                        <button class="action-btn download" onclick="downloadFile('${file.downloadUrl}')">
                            <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
                            下载
                        </button>
                        <button class="action-btn info" onclick="showFileInfo('${file.datePath}', '${file.fileName}')">
                            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>
                            详情
                        </button>
                    </div>
                </div>
            `).join('');
        }

        function getFileIconClass(fileType) {
            if (!fileType) return 'other';
            if (fileType.includes('image')) return 'image';
            if (fileType.includes('video')) return 'video';
            if (fileType.includes('audio')) return 'audio';
            if (fileType.includes('zip') || fileType.includes('rar') || fileType.includes('tar')) return 'archive';
            if (fileType.includes('document') || fileType.includes('pdf') || fileType.includes('text') || fileType.includes('word')) return 'document';
            return 'other';
        }

        function getFileIcon(fileType) {
            if (!fileType) return '📄';
            if (fileType.includes('image')) return '🖼️';
            if (fileType.includes('video')) return '🎬';
            if (fileType.includes('audio')) return '🎵';
            if (fileType.includes('zip') || fileType.includes('rar') || fileType.includes('tar')) return '📦';
            if (fileType.includes('pdf')) return '📕';
            if (fileType.includes('word')) return '📘';
            return '📄';
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            return date.toLocaleString('zh-CN', {
                year: 'numeric',
                month: '2-digit',
                day: '2-digit',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function downloadFile(url) {
            window.location.href = url;
        }

        async function showFileInfo(datePath, fileName) {
            try {
                const response = await fetch(`/api/files/info/${datePath}/${encodeURIComponent(fileName)}`);
                const file = await response.json();
                
                document.getElementById('modalBody').innerHTML = `
                    <div class="info-row">
                        <span class="info-label">文件名</span>
                        <span class="info-value">${file.fileName}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">文件类型</span>
                        <span class="info-value">${file.fileType || 'unknown'}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">文件大小</span>
                        <span class="info-value">${formatFileSize(file.fileSize)}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">上传时间</span>
                        <span class="info-value">${file.uploadTime ? formatDate(file.uploadTime) : '-'}</span>
                    </div>
                    <div class="info-row">
                        <span class="info-label">下载链接</span>
                        <span class="info-value">
                            <input type="text" value="${window.location.origin}${file.downloadUrl}" style="width: 150px; background: rgba(255,255,255,0.1); border: none; border-radius: 4px; padding: 4px; color: #fff; font-size: 11px;" readonly id="downloadUrlInput">
                            <button class="copy-btn" onclick="copyUrl()">复制</button>
                        </span>
                    </div>
                `;
                document.getElementById('modalOverlay').classList.add('show');
            } catch (error) {
                alert('获取文件信息失败: ' + error.message);
            }
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('show');
        }

        function copyUrl() {
            const input = document.getElementById('downloadUrlInput');
            input.select();
            document.execCommand('copy');
            alert('链接已复制到剪贴板');
        }

        function updateStats() {
            const totalFiles = allFiles.length;
            const totalSize = allFiles.reduce((sum, file) => sum + file.fileSize, 0);
            const fileTypes = new Set(allFiles.map(file => file.fileType).filter(Boolean)).size;

            document.getElementById('totalFiles').textContent = totalFiles;
            document.getElementById('totalSize').textContent = formatFileSize(totalSize);
            document.getElementById('fileTypes').textContent = fileTypes;
        }

        document.getElementById('searchInput').addEventListener('input', function(e) {
            const keyword = e.target.value.toLowerCase();
            const filtered = allFiles.filter(file => 
                file.fileName.toLowerCase().includes(keyword)
            );
            renderFiles(filtered);
        });

        document.getElementById('modalOverlay').addEventListener('click', function(e) {
            if (e.target === this) {
                closeModal();
            }
        });

        document.addEventListener('DOMContentLoaded', loadFiles);
    </script>
</body>
</html>
